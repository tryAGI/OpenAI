      type: object
      properties:
        event_id:
          type: string
          description: The unique ID of the server event.
          example: event_5758
        type:
          enum:
            - rate_limits.updated
          type: string
          description: 'The event type, must be "rate_limits.updated".'
          example: rate_limits.updated
        rate_limits:
          type: array
          items:
            type: object
            properties:
              name:
                enum:
                  - requests
                  - tokens
                  - input_tokens
                  - output_tokens
                type: string
                description: The name of the rate limit.
                example: requests
              limit:
                type: integer
                description: The maximum allowed value for the rate limit.
                example: 1000
              remaining:
                type: integer
                description: The remaining value before the limit is reached.
                example: 999
              reset_seconds:
                type: number
                description: Seconds until the rate limit resets.
                example: 60
          description: List of rate limit information.
      description: Emitted after every "response.done" event to indicate the updated rate limits.
      example:
        event_id: event_5758
        type: rate_limits.updated
        rate_limits:
          - name: requests
            limit: 1000
            remaining: 999
            reset_seconds: 60
          - name: tokens
            limit: 50000
            remaining: 49950
            reset_seconds: 60

        name: conversation.item.delete
        group: realtime
        example: "{\n    \"event_id\": \"event_901\",\n    \"type\": \"conversation.item.delete\",\n    \"item_id\": \"msg_003\"\n}\n"
    RealtimeBetaClientEventConversationItemRetrieve:
      required:
        - type
        - item_id
